databases:
  - name: acervo-postgres
    databaseName: acervo
    user: acervo

services:
  - type: web
    name: acervo-teste
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: acervo-postgres
          property: connectionString
